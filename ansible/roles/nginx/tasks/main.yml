---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Create custom index.html
  copy:
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>{{ inventory_hostname }}</title></head>
      <body>
        <h1>Web Server: {{ inventory_hostname }}</h1>
        <p>Internal IP: {{ ansible_default_ipv4.address }}</p>
      </body>
      </html>
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'

- name: Enable and start nginx
  systemd:
    name: nginx
    enabled: yes
    state: started
    daemon_reload: yes