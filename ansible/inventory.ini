# =============================================================================
# Ansible Inventory для DevOps курсовой
# Использует ~/.ssh/config для ProxyJump
# =============================================================================

[logging]
logging-server ansible_host=logging ansible_user=ubuntu ansible_port=22

[webservers]
web-server-a ansible_host=web-a ansible_user=ubuntu ansible_port=22
web-server-b ansible_host=web-b ansible_user=ubuntu ansible_port=22

[monitoring]
monitoring-server ansible_host=monitoring ansible_user=ubuntu ansible_port=22

[bastion]
bastion-host ansible_host=bastion ansible_user=ubuntu ansible_port=22

# =============================================================================
# Глобальные настройки для всех хостов
# =============================================================================
[all:vars]
# Используем системный Python 3
ansible_python_interpreter=/usr/bin/python3

# 🔑 ВАЖНО: Используем SSH config файл для ProxyJump и ключей
ansible_ssh_common_args='-F /home/oleg/.ssh/config -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
# Отключаем хост-кей проверку (для автоматизации)
host_key_checking = False

# ✅ Правильное имя для таймаута (не 'timeout'!)
ansible_timeout = 30